services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: nusa
      POSTGRES_PASSWORD: nusa
      POSTGRES_DB: nusabahasa
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nusa -d nusabahasa"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://nusa:nusa@db:5432/nusabahasa
      JWT_SECRET: change-me-to-a-long-random-string
      CORS_ORIGINS: http://localhost:5173,http://localhost:5174
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  pgdata:
